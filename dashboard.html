<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="geist bg-[#F8FAFC] h-screen">

    <header>

        <div class="px-20 navbar bg-base-100 shadow-sm flex justify-between">
            <div class=" flex gap-1 items-center">
                <img class="w-9 " src="assets/github-logo.png" alt="">
                <a class="font-bold text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="searchInput" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="">
                    <div class="w-10 ">
                        <button onclick="searchIssues()" class="btn btn-primary">Search</button>
                    </div>


                </div>
            </div>
        </div>
    </header>

    <section class="bg-[#fff] shadow-md mt-16  p-6 tab-btn-section md:w-[1200px] mx-auto">
        <div class="flex gap-2">
            <button id="allbtn" onclick="displayAllIssues(allData,this)" class="btn btn-primary px-12 py-3">All</button>
            <button id="openbtn" onclick="displayOpenIssues(allData,this)" class="btn px-12 py-3">Open</button>
            <button id="closebtn" onclick="displayCloseIssues(allData,this)" class="btn px-12 py-3">Closed</button>
        </div>
    </section>


    <section class="issue-section md:w-[1200px] mx-auto shadow-md p-6 mt-4  bg-[#fff]">
       
      <div id="loader-section" class="flex justify-center hidden">
         <span  class="loading loading-spinner loading-xl"></span>
      </div>
       
       
       
        <div id="card-stat" class="mt-4 flex gap-2  items-center justify-between">

            <div class="flex gap-2">
                <div class="flex items-center justify-center ">
                    <div class=" rounded-full bg-[#ECE4FF]">
                        <img class="w-12 p-2 " src="assets/Aperture.png" alt="">
                    </div>
                </div>
                <div>
                    <h4 class="font-semibold text-[20px]"><span id="totalCount">50</span> Issues</h4>

                    <h4 class="text-gray-400 text-[16px]">Track and manage your project issues</h4>

                </div>
            </div>
            <div class="flex items-center gap-2">

                <div class="rounded-full bg-[#00A96E] w-1 h-1 p-1.5"></div>
                <p>Open</p>
                <div class="rounded-full bg-[#A855F7] w-1 h-1 p-1.5"></div>

                <p>Closed</p>
            </div>
        </div>



        <div id="allCardContainer" class="card-section-div mt-6 grid grid-cols-1 justify-self-center md:grid-cols-4 gap-3"><!--grid grid-col-4-->


            
        </div>

    </section>



<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box ">
    <div class="box-container space-y-4">
        
    </div>
   
                    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


<script src="dashboard.js"></script>
</body>

</html>
